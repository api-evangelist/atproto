meters:
  - name: PDS Compute Hours
    unit: vCPU-Hour
    aggregation: sum
  - name: Repository Storage
    unit: GB-Month
    aggregation: sum
  - name: Firehose Bandwidth
    unit: GB
    aggregation: sum
  - name: API Requests Served
    unit: Request
    aggregation: sum
principles:
  - name: Visibility
    description: >-
      Track AT Protocol infrastructure consumption (PDS, Relay, AppView, feed
      generators) monthly across all cloud resources to identify cost drivers.
  - name: Optimization
    description: >-
      Right-size PDS and Relay instances based on account count and firehose
      throughput; leverage caching on AppView read paths to reduce compute costs.
  - name: Accountability
    description: >-
      Tag cloud resources by AT Protocol service component (PDS, Relay,
      AppView, Labeler, Feed Generator) to attribute costs to logical units
      and enable chargeback for multi-tenant deployments.
